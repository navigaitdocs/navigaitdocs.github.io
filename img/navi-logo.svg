<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <!-- Body -->
  <rect x="25" y="50" width="50" height="45" rx="8" fill="#4a90d9" />
  <!-- Head -->
  <rect x="30" y="18" width="40" height="30" rx="8" fill="#4a90d9" />
  <!-- Neck -->
  <rect x="44" y="46" width="12" height="8" fill="#4a90d9" />
  <!-- Eyes -->
  <circle cx="42" cy="31" r="5" fill="white" />
  <circle cx="58" cy="31" r="5" fill="white" />
  <circle cx="43" cy="32" r="2.5" fill="#1a3a5c" />
  <circle cx="59" cy="32" r="2.5" fill="#1a3a5c" />
  <!-- Mouth -->
  <rect x="38" y="40" width="24" height="4" rx="2" fill="white" opacity="0.8" />
  <!-- Chest panel -->
  <rect x="35" y="60" width="30" height="20" rx="4" fill="#2d6aa8" />
  <circle cx="43" cy="68" r="4" fill="#7ec8f5" />
  <circle cx="57" cy="68" r="4" fill="#7ec8f5" />
  <rect x="38" y="76" width="24" height="3" rx="1.5" fill="#7ec8f5" opacity="0.6" />
  <!-- Arms -->
  <rect x="8" y="52" width="14" height="35" rx="6" fill="#4a90d9" />
  <rect x="78" y="52" width="14" height="35" rx="6" fill="#4a90d9" />
  <!-- Wheels -->
  <ellipse cx="37" cy="97" rx="10" ry="6" fill="#1a3a5c" />
  <ellipse cx="63" cy="97" rx="10" ry="6" fill="#1a3a5c" />
  <!-- Antenna -->
  <line x1="50" y1="18" x2="50" y2="8" stroke="#4a90d9" stroke-width="3" stroke-linecap="round" />
  <circle cx="50" cy="6" r="4" fill="#7ec8f5" />
</svg>
